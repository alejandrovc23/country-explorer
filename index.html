<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Country Explorer</title>
  <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
  <div class="page-shell">
    <header class="hero">
      <p class="eyebrow">WDD 330 Final Project</p>
      <h1>Country Explorer</h1>
      <p class="hero-copy">
        Search for countries and explore key details in a clean, friendly
        interface.
      </p>
    </header>

    <main class="app-card">
      <section class="search-section" aria-label="Country search">
        <label class="search-label" for="regionFilter">Filter by region</label>
        <select id="regionFilter" name="regionFilter" class="region-filter" aria-label="Filter countries by region">
          <option value="all">All Regions</option>
          <option value="africa">Africa</option>
          <option value="americas">Americas</option>
          <option value="asia">Asia</option>
          <option value="europe">Europe</option>
          <option value="oceania">Oceania</option>
        </select>

        <label class="search-label" for="country-search">Find a country</label>
        <div class="search-controls">
          <input id="country-search" name="country-search" type="text" placeholder="Search by country name"
            aria-label="Search for a country" />
          <button type="button">Search</button>
        </div>
      </section>

      <section class="results-section" aria-label="Search results">
        <label class="search-label" for="sortSelect">Sort By</label>
        <select id="sortSelect" name="sortSelect" class="region-filter" aria-label="Sort countries">
          <option value="name">Name (A-Z)</option>
          <option value="population">Population (High to Low)</option>
        </select>
        <div id="results" class="results-container"></div>
      </section>
    </main>
  </div>

  <div id="countryModal" class="modal" aria-hidden="true">
    <div class="modal-overlay" data-close-modal="true"></div>
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modalCountryName">
      <button type="button" class="modal-close" id="closeModalButton"
        aria-label="Close country details modal">x</button>
      <img id="modalFlag" class="modal-flag" src="" alt="" />
      <div class="modal-body">
        <h2 id="modalCountryName">Country Name</h2>
        <p><strong>Capital:</strong> <span id="modalCapital"></span></p>
        <p><strong>Region:</strong> <span id="modalRegion"></span></p>
        <p><strong>Population:</strong> <span id="modalPopulation"></span></p>
      </div>
    </div>
  </div>

  <script type="module" src="/js/main.js"></script>
</body>

</html>
